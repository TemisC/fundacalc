<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESCALC — Acceso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 36px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 1.4rem;
    }
    .brand-title { color: #e6edf3; font-size: 1.4rem; font-weight: 700; margin: 0; }
    .brand-sub { color: #8b949e; font-size: 0.82rem; margin: 0; }
    label { color: #c9d1d9; font-size: 0.85rem; margin-bottom: 4px; display: block; }
    .form-control {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.9rem;
      transition: border-color 0.15s;
    }
    .form-control:focus {
      background: #0d1117;
      border-color: #388bfd;
      color: #e6edf3;
      box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
    }
    .btn-login {
      width: 100%;
      background: #238636;
      border: none;
      color: #fff;
      padding: 11px;
      border-radius: 6px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 6px;
    }
    .btn-login:hover { background: #2ea043; }
    .btn-login:disabled { background: #238636; opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: #3d1111;
      border: 1px solid #f85149;
      color: #f85149;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.83rem;
      margin-bottom: 16px;
      display: none;
    }
    .input-group-wrapper { margin-bottom: 16px; }
    .footer-note {
      text-align: center;
      color: #484f58;
      font-size: 0.74rem;
      margin-top: 24px;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">🏗️</div>
    <p class="brand-title">ESCALC</p>
    <p class="brand-sub">Diseño de Cimentaciones</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="input-group-wrapper">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" class="form-control"
             placeholder="Ingresa tu usuario" autocomplete="username" autofocus>
    </div>
    <div class="input-group-wrapper">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" class="form-control"
             placeholder="••••••••" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login" id="btnLogin">
      <span class="spinner" id="spinner"></span>
      Ingresar
    </button>
  </form>

  <p class="footer-note">Acceso restringido · Solo personal autorizado</p>
  <p style="text-align:center;color:#333;font-size:0.70rem;margin-top:16px;">
    Ing. Civil Temis Castillo &nbsp;&middot;&nbsp;
    <strong>ESCALC</strong> — Engineering Software CALCulation
  </p>
</div>

<script>
  // Show error from URL param (after redirect)
  const params = new URLSearchParams(location.search);
  if (params.get('error') === '1') {
    const msg = document.getElementById('errorMsg');
    msg.textContent = 'Usuario o contraseña incorrectos.';
    msg.style.display = 'block';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const sp  = document.getElementById('spinner');
    const msg = document.getElementById('errorMsg');
    msg.style.display = 'none';
    btn.disabled = true;
    sp.style.display = 'inline-block';

    const fd = new FormData();
    fd.append('username', document.getElementById('username').value.trim());
    fd.append('password', document.getElementById('password').value);

    try {
      const resp = await fetch('/api/login', { method: 'POST', body: fd });
      if (resp.ok) {
        const data = await resp.json();
        window.location.href = data.redirect || '/';
      } else {
        msg.textContent = 'Usuario o contraseña incorrectos.';
        msg.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch {
      msg.textContent = 'Error de conexión. Intenta nuevamente.';
      msg.style.display = 'block';
    } finally {
      btn.disabled = false;
      sp.style.display = 'none';
    }
  }

  // Allow Enter key in username field to move to password
  document.getElementById('username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('password').focus();
    }
  });
</script>

</body>
</html>
